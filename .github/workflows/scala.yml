name: Scala CI

on:
  push:
    branches: [ master ]
    tags: ["*"]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - uses: coursier/cache-action@v8
    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'
    - uses: sbt/setup-sbt@v1
    - name: Set up repository credentials
      env:
        NEXUS_USER: ${{ secrets.NEXUS_USER }}
        NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      run: mkdir -p $HOME/.sbt/1.0 && echo "credentials += Credentials(\"Sonatype Nexus Repository Manager\", \"nexus.waylay.io\", \"${NEXUS_USER}\", \"${NEXUS_PASSWORD}\")" > $HOME/.sbt/1.0/global.sbt
    - name: Run tests
      run: sbt clean test IntegrationTest/test
    - name: Publish
      if: ${{ github.event_name != 'pull_request' }}
      run: sbt +publish
  merge:
    name: Merge dependency update
    if: ${{ github.actor == 'scala-steward' || github.actor == 'scala-steward[bot]' }}
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: merge PR
        uses: desbo/merge-pr-action@v0
        env:
          INPUT_GITHUB_TOKEN: ${{ secrets.PR_MERGE_PAT }}
        with:
          GITHUB_TOKEN: ${{ secrets.PR_MERGE_PAT }}
          ALLOWED_UPDATE: minor
          MERGE_METHOD: squash
